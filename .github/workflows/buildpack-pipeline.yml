name: Buildpack Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Crane
        uses: imjasonh/setup-crane@v0.4

      - name: Install Pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.12.3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower-case owner env
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build Build-Base
        id: build-base
        uses: docker/build-push-action@v4.1.0
        with:
          context: .
          file: stack/build.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-build-base:latest

      - name: Build Run-Base
        id: run-base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: stack/run.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-run-base:latest


      - name: Package and Publish Buildpacks node engine
        run: |
          pack buildpack package ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-node-engine:1.0.0 \
            --path ./wolfi-node-buildpack \
            --target linux/amd64 \
            --target linux/arm64 \
            --publish

      - name: Package and Publish Meta Buildpack meta
        run: |
          pack buildpack package ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/nodejs-meta:1.0.0 \
            --config ./wolfi-nodejs-meta/package.toml \
            --target linux/amd64 \
            --target linux/arm64 \
            --publish

      - name: Create and Publish Custom Builder
        run: |
          pack builder create ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/my-custom-builder:latest \
            --config builder.toml \
            --publish

      - name: Resolve Image Digests
        id: resolve-digests
        run: |
          echo "engine_digest=$(crane digest ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-node-engine:1.0.0)" >> $GITHUB_OUTPUT
          echo "meta_digest=$(crane digest ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/nodejs-meta:1.0.0)" >> $GITHUB_OUTPUT
          echo "builder_digest=$(crane digest ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/my-custom-builder:latest)" >> $GITHUB_OUTPUT

      - name: Attest Build Base Image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-build-base
          subject-digest: ${{ steps.build-base.outputs.digest }}
          push-to-registry: true

      - name: Attest Run Base Image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-run-base
          subject-digest: ${{ steps.run-base.outputs.digest }}
          push-to-registry: true

      - name: Attest Wolfi Node Engine Buildpack
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/wolfi-node-engine
          subject-digest: ${{ steps.resolve-digests.outputs.engine_digest }}
          push-to-registry: true

      - name: Attest Node.js Meta Buildpack
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/nodejs-meta
          subject-digest: ${{ steps.resolve-digests.outputs.meta_digest }}
          push-to-registry: true

      - name: Attest Custom Builder Image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/my-custom-builder
          subject-digest: ${{ steps.resolve-digests.outputs.builder_digest }}
          push-to-registry: true


  cleanup-ghcr-images:
    needs: [build-and-publish]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - wolfi-build-base
          - wolfi-run-base
          - wolfi-node-engine
          - nodejs-meta
          - my-custom-builder
    steps:
      - name: Cleanup Untagged Images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ matrix.package_name }}
          older-than: 4 hour
          delete-untagged: true
          keep-n-tagged: 0
